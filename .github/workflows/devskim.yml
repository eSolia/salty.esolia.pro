name: DevSkim Security Scan

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  schedule:
    - cron: '30 4 * * 2'
  workflow_dispatch:

permissions:
  contents: read
  security-events: write

jobs:
  devskim:
    name: DevSkim Security Analysis
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          persist-credentials: false

      - name: Run DevSkim scanner
        uses: microsoft/DevSkim-Action@4b5047945a44163b94642a1cecc0d93a3f428cc6 # v1
        with:
          directory-to-scan: .
          should-scan-archives: false
          output-filename: devskim-results.sarif

      - name: Upload DevSkim results to GitHub Security
        uses: github/codeql-action/upload-sarif@9792ccaef0455e446c567163589397e8c3ac2e0d # v3
        if: always()
        with:
          sarif_file: devskim-results.sarif
          category: devskim

      - name: Upload DevSkim results as artifact
        uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f # v7.0.0
        if: always()
        with:
          name: devskim-results
          path: devskim-results.sarif
          retention-days: 30
